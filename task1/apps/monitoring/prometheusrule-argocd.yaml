apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argocd-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    app.kubernetes.io/part-of: argocd
spec:
  groups:
    - name: argocd.critical
      interval: 30s
      rules:
        - alert: ArgoCDServerDown
          expr: |
            absent(up{job="argocd-server-metrics"} == 1) or up{job="argocd-server-metrics"} == 0
          for: 2m
          labels:
            severity: critical
            component: argocd-server
          annotations:
            summary: "Argo CD Server is down"
            description: "The Argo CD server has been down for more than 2 minutes."

        - alert: ArgoCDRepoServerDown
          expr: |
            absent(up{job="argocd-repo-server-metrics"} == 1) or up{job="argocd-repo-server-metrics"} == 0
          for: 2m
          labels:
            severity: critical
            component: argocd-repo-server
          annotations:
            summary: "Argo CD Repo Server is down"
            description: "The Argo CD repo server has been down for more than 2 minutes."

        - alert: ArgoCDApplicationControllerDown
          expr: |
            absent(up{job="argocd-application-controller-metrics"} == 1) or up{job="argocd-application-controller-metrics"} == 0
          for: 2m
          labels:
            severity: critical
            component: argocd-application-controller
          annotations:
            summary: "Argo CD Application Controller is down"
            description: "The Argo CD application controller has been down for more than 2 minutes."

    - name: argocd.warnings
      interval: 30s
      rules:
        - alert: ArgoCDAppHealthDegraded
          expr: |
            argocd_app_info{health_status=~"Degraded|Missing|Unknown"} == 1
          for: 5m
          labels:
            severity: warning
            component: argocd
          annotations:
            summary: "Argo CD Application {{ $labels.name }} health is degraded"
            description: "Application {{ $labels.name }} in namespace {{ $labels.namespace }} has been in {{ $labels.health_status }} state for more than 5 minutes."

        - alert: ArgoCDAppSyncFailed
          expr: |
            sum by (name, namespace) (increase(argocd_app_sync_total{phase=~"Error|Failed"}[10m])) > 0
          for: 1m
          labels:
            severity: warning
            component: argocd
          annotations:
            summary: "Argo CD Application {{ $labels.name }} sync failed"
            description: "Application {{ $labels.name }} in namespace {{ $labels.namespace }} has had a failed sync operation."

        - alert: ArgoCDAppOutOfSync
          expr: |
            argocd_app_info{sync_status="OutOfSync"} == 1
          for: 15m
          labels:
            severity: warning
            component: argocd
          annotations:
            summary: "Argo CD Application {{ $labels.name }} is out of sync"
            description: "Application {{ $labels.name }} has been out of sync for more than 15 minutes."

        - alert: ArgoCDReconcileSlow
          expr: |
            histogram_quantile(0.95, sum by (le) (rate(argocd_app_reconcile_bucket[5m]))) > 60
          for: 10m
          labels:
            severity: warning
            component: argocd
          annotations:
            summary: "Argo CD reconciliation is slow"
            description: "95th percentile reconciliation time is {{ $value | humanizeDuration }}, exceeding 60s threshold."

        - alert: ArgoCDServerHighMemory
          expr: |
            container_memory_working_set_bytes{namespace="argocd", pod=~"argocd-server-.*"}
            / container_spec_memory_limit_bytes{namespace="argocd", pod=~"argocd-server-.*"} > 0.9
          for: 5m
          labels:
            severity: warning
            component: argocd-server
          annotations:
            summary: "Argo CD Server memory usage is high"
            description: "Argo CD server pod {{ $labels.pod }} is using {{ $value | humanizePercentage }} of its memory limit."
